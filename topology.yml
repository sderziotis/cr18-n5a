name: cr-18-n5a-CTF1-v1
hosts:
  - name: uservm
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: true
  - name: servervm
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: true
  - name: pentestvm
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: false
routers:
  - name: router
    flavor: standard.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    hidden: false
networks:
  - name: lan
    cidr: 192.168.0.0/24
    accessible_by_user: true
    hidden: false
wan:
  name: internet-connection
  cidr: 10.10.10.0/24
net_mappings:
  - host: uservm
    network: lan
    ip: 192.168.0.10
  - host: servervm
    network: lan
    ip: 192.168.0.2
  - host: pentestvm
    network: lan
    ip: 192.168.0.3
router_mappings:
  - router: router
    network: lan
    ip: 192.168.0.1
groups: []